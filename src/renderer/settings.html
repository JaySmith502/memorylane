<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>Settings</title>
  <link rel="stylesheet" href="./settings.css">
</head>
<body class="bg-zinc-900 text-zinc-100 min-h-screen antialiased">
  <div class="p-6 max-w-lg mx-auto">
    <!-- Header -->
    <div class="mb-6">
      <h1 class="text-xl font-semibold text-white">Settings</h1>
      <p class="text-sm text-zinc-400 mt-1">Configure your MemoryLane preferences</p>
    </div>

    <!-- API Key Section -->
    <section class="bg-zinc-800/50 border border-zinc-700/50 rounded-xl p-5">
      <div class="flex items-start gap-3 mb-4">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
          </svg>
        </div>
        <div>
          <h2 class="text-base font-medium text-white">OpenRouter API Key</h2>
          <p class="text-sm text-zinc-400 mt-0.5">
            Required for LLM-based activity classification.
            <a href="https://openrouter.ai/" id="get-key-link" class="text-violet-400 hover:text-violet-300 transition-colors">Get your key &rarr;</a>
          </p>
        </div>
      </div>

      <!-- Status Badge -->
      <div id="status" class="mb-4 p-3 rounded-lg text-sm font-medium flex items-center gap-2"></div>

      <!-- Input Group -->
      <div class="space-y-3">
        <div class="relative">
          <input
            type="password"
            id="api-key-input"
            placeholder="sk-or-v1-..."
            autocomplete="off"
            class="w-full px-4 py-3 bg-zinc-900/50 border border-zinc-600 rounded-lg text-zinc-100 font-mono text-sm placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-violet-500/50 focus:border-violet-500 transition-all"
          >
          <button
            type="button"
            id="toggle-visibility"
            class="absolute right-2 top-1/2 -translate-y-1/2 px-3 py-1.5 text-xs font-medium text-zinc-400 hover:text-zinc-200 bg-zinc-700/50 hover:bg-zinc-700 rounded-md transition-all"
            title="Show/Hide"
          >
            <span id="visibility-icon">Show</span>
          </button>
        </div>

        <!-- Action Buttons -->
        <div class="flex gap-2">
          <button
            type="button"
            id="save-button"
            class="flex-1 px-4 py-2.5 bg-violet-600 hover:bg-violet-500 disabled:bg-violet-600/50 text-white font-medium rounded-lg transition-all disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-violet-500/50"
          >
            Save Key
          </button>
          <button
            type="button"
            id="delete-button"
            disabled
            class="px-4 py-2.5 bg-zinc-700/50 hover:bg-red-600/20 border border-zinc-600 hover:border-red-500/50 text-zinc-300 hover:text-red-400 disabled:text-zinc-500 disabled:hover:bg-zinc-700/50 disabled:hover:border-zinc-600 disabled:hover:text-zinc-500 font-medium rounded-lg transition-all disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-red-500/50"
          >
            Delete
          </button>
        </div>
      </div>

      <!-- Message Area -->
      <div id="message" class="mt-3 text-sm font-medium min-h-[20px]"></div>
    </section>

    <!-- Info Footer -->
    <p class="mt-4 text-xs text-zinc-500 text-center">
      Your API key is encrypted and stored securely on this device.
    </p>
  </div>

  <script type="module" src="./settings.ts"></script>
</body>
</html>
