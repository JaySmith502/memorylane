<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>Settings</title>
  <link rel="stylesheet" href="./settings.css">
</head>
<body>
  <div class="container">
    <h1>Settings</h1>

    <section class="section">
      <h2>OpenRouter API Key</h2>
      <p class="description">
        Required for LLM-based activity classification.
        <a href="https://openrouter.ai/" id="get-key-link">Get your API key</a>
      </p>

      <div id="status" class="status"></div>

      <div class="input-group">
        <input type="password" id="api-key-input" placeholder="sk-or-..." autocomplete="off">
        <button type="button" id="toggle-visibility" class="icon-button" title="Show/Hide">
          <span id="visibility-icon">Show</span>
        </button>
      </div>

      <div class="button-group">
        <button type="button" id="save-button" class="primary">Save</button>
        <button type="button" id="delete-button" class="danger" disabled>Delete</button>
      </div>

      <div id="message" class="message"></div>
    </section>
  </div>

  <script type="module" src="./settings.ts"></script>
</body>
</html>
