<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>Settings</title>
  <link rel="stylesheet" href="./settings.css">
</head>
<body class="bg-zinc-900 text-zinc-100 min-h-screen antialiased">
  <div class="p-8 max-w-lg mx-auto">
    <!-- API Key Section -->
    <section class="bg-zinc-800/50 border border-zinc-700/50 rounded-xl p-6">
      <div class="mb-4">
        <h1 class="text-lg font-medium text-white">API Key</h1>
        <p class="text-sm text-zinc-400 mt-1">
          Required for activity classification.
        </p>
      </div>

      <!-- Status Badge -->
      <div id="status" class="mb-4 p-3 rounded-lg text-sm font-medium flex items-center gap-2"></div>

      <!-- Input Group -->
      <div class="space-y-3">
        <div class="relative">
          <input
            type="password"
            id="api-key-input"
            placeholder="sk-or-v1-..."
            autocomplete="off"
            class="w-full px-4 py-3 bg-zinc-900/50 border border-zinc-600 rounded-lg text-zinc-100 font-mono text-sm placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-zinc-500 focus:border-zinc-500 transition-all"
          >
          <button
            type="button"
            id="toggle-visibility"
            class="absolute right-2 top-1/2 -translate-y-1/2 px-3 py-1.5 text-xs font-medium text-zinc-400 hover:text-zinc-200 bg-zinc-700/50 hover:bg-zinc-700 rounded-md transition-all"
            title="Show/Hide"
          >
            <span id="visibility-icon">Show</span>
          </button>
        </div>

        <!-- Action Buttons -->
        <div class="flex gap-2">
          <button
            type="button"
            id="save-button"
            class="flex-1 px-4 py-2.5 bg-zinc-700 hover:bg-zinc-600 disabled:bg-zinc-700/50 text-white font-medium rounded-lg transition-all disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-zinc-500"
          >
            Save
          </button>
          <button
            type="button"
            id="delete-button"
            disabled
            class="px-4 py-2.5 bg-zinc-700/50 hover:bg-red-600/20 border border-zinc-600 hover:border-red-500/50 text-zinc-300 hover:text-red-400 disabled:text-zinc-500 disabled:hover:bg-zinc-700/50 disabled:hover:border-zinc-600 disabled:hover:text-zinc-500 font-medium rounded-lg transition-all disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-red-500/50"
          >
            Delete
          </button>
        </div>
      </div>

      <!-- Message Area -->
      <div id="message" class="mt-3 text-sm font-medium min-h-[20px]"></div>
    </section>

    <!-- Info Footer -->
    <p class="mt-4 text-xs text-zinc-500 text-center">
      Your API key is encrypted and stored securely on this device.
    </p>
  </div>

  <script type="module" src="./settings.ts"></script>
</body>
</html>
