name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing or new tag to build and release
        required: true
        type: string

concurrency:
  group: release-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

jobs:
  validate-release:
    name: Validate release
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v$PACKAGE_VERSION"

          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "Release tag $RELEASE_TAG does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Check macOS signing secrets
        run: |
          missing=0
          for name in MAC_CERT_BASE64 MAC_CERT_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required secret: $name" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Check Windows signing secrets
        run: |
          missing=0
          for name in AZURE_TENANT_ID AZURE_CLIENT_ID AZURE_CLIENT_SECRET; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required secret: $name" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

  build-mac:
    name: Build macOS
    runs-on: macos-15
    needs: validate-release
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import macOS signing certificate
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/memorylane-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/memorylane-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo -n "$MAC_CERT_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "CSC_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build signed macOS artifacts
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: npm run make:mac

      - name: Upload macOS release files
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-${{ env.RELEASE_TAG }}
          retention-days: 3
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml

  build-win:
    name: Build Windows
    runs-on: windows-2025
    needs: validate-release
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build signed Windows artifacts
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: npm run make:win

      - name: Upload Windows release files
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-${{ env.RELEASE_TAG }}
          retention-days: 3
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml

  publish-release:
    name: Publish draft release
    runs-on: ubuntu-24.04
    needs:
      - validate-release
      - build-mac
      - build-win

    steps:
      - name: Download all workflow artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Show release files
        run: find release-assets -type f | sort

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.zip
            release-assets/**/*.exe
            release-assets/**/*.blockmap
            release-assets/**/latest.yml
            release-assets/**/latest-mac.yml
